name: Release Rust (crates.io)

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Preflight packaging check (agentdir)
        run: cargo publish -p agentdir --dry-run

      - name: Publish agentdir (core library)
        run: cargo publish -p agentdir
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index and verify agentdir-cli publishability
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "agentdir") | .version')

          for i in $(seq 1 30); do
            if cargo search agentdir --limit 5 2>/dev/null \
              | grep -q "^agentdir = \"$VERSION\""; then
              echo "agentdir $VERSION found in crates.io index after attempt $i"
              sleep 5
              echo "Verifying agentdir-cli can resolve dependency..."
              cargo publish -p agentdir-cli --dry-run
              exit 0
            fi
            echo "Waiting for agentdir $VERSION in crates.io index... attempt $i/30"
            sleep 10
          done

          echo "ERROR: agentdir $VERSION did not appear in crates.io index in time"
          exit 1

      - name: Publish agentdir-cli
        run: cargo publish -p agentdir-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
