name: Release Rust (crates.io)

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Preflight packaging check (agentdir)
        run: cargo publish -p agentdir --dry-run

      - name: Publish agentdir (core library)
        run: cargo publish -p agentdir || echo "::warning::agentdir publish failed (may already exist)"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io sparse index to reflect agentdir
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "agentdir") | .version')

          for i in $(seq 1 60); do
            # Query sparse index directly — much faster than `cargo search`
            if curl -sfL "https://index.crates.io/ag/en/agentdir" 2>/dev/null \
              | grep -q "\"vers\":\"$VERSION\""; then
              echo "agentdir $VERSION found in sparse index after attempt $i"
              sleep 5
              exit 0
            fi
            echo "Waiting for agentdir $VERSION in sparse index... attempt $i/60"
            sleep 10
          done

          echo "ERROR: agentdir $VERSION did not appear in sparse index in time"
          exit 1

      - name: Publish agentdir-cli
        run: cargo publish -p agentdir-cli || echo "::warning::agentdir-cli publish failed (may already exist)"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
